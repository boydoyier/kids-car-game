<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kids Car Racing</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a1a2e;
  display:flex; align-items:center; justify-content:center;
  min-height:100svh; font-family:Arial,sans-serif;
  overflow:hidden; touch-action:none;
}
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Canvas ────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const DPR    = Math.min(window.devicePixelRatio||1, 2);
const BASE_W = 800, BASE_H = 600;
let W = BASE_W, H = BASE_H, scale = 1;

function resize() {
  scale = Math.min(window.innerWidth/BASE_W, window.innerHeight/BASE_H);
  canvas.width  = Math.round(BASE_W*scale*DPR);
  canvas.height = Math.round(BASE_H*scale*DPR);
  canvas.style.width  = Math.round(BASE_W*scale)+'px';
  canvas.style.height = Math.round(BASE_H*scale)+'px';
  ctx.setTransform(scale*DPR, 0, 0, scale*DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── Road layout ───────────────────────────────────────────────
const ROAD_CX    = 400;
const ROAD_W     = 320;
const ROAD_LEFT  = ROAD_CX - ROAD_W/2;   // 240
const ROAD_RIGHT = ROAD_CX + ROAD_W/2;   // 560

const LANES = [
  ROAD_LEFT + ROAD_W*0.12,   // ≈ 278
  ROAD_LEFT + ROAD_W*0.31,   // ≈ 339
  ROAD_CX,                    //   400
  ROAD_LEFT + ROAD_W*0.69,   // ≈ 461
  ROAD_LEFT + ROAD_W*0.88,   // ≈ 522
];

// ── Road texture (tiled in y; TEX_H must be power-of-2) ───────
const TEX_W = BASE_W, TEX_H = 512;

function buildRoadTexture() {
  const oc = document.createElement('canvas');
  oc.width = TEX_W; oc.height = TEX_H;
  const ot = oc.getContext('2d');

  // Grass
  ot.fillStyle = '#3a7d44'; ot.fillRect(0, 0, TEX_W, TEX_H);
  ot.fillStyle = '#35723f';
  for (let gx=0; gx<TEX_W; gx+=24)
    for (let gy=0; gy<TEX_H; gy+=24)
      ot.fillRect(gx+4, gy+4, 3, 3);

  // Road surface
  ot.fillStyle = '#5f5f5f'; ot.fillRect(ROAD_LEFT, 0, ROAD_W, TEX_H);
  ot.fillStyle = '#575757';
  for (let gy=0; gy<TEX_H; gy+=8) ot.fillRect(ROAD_LEFT, gy, ROAD_W, 1);

  // Edge lines
  ot.fillStyle = '#ffffff';
  ot.fillRect(ROAD_LEFT, 0, 6, TEX_H);
  ot.fillRect(ROAD_RIGHT-6, 0, 6, TEX_H);

  // Dashed centre line (period 64: 32 on / 32 off)
  ot.fillStyle = 'rgba(255,255,255,0.55)';
  for (let gy=0; gy<TEX_H; gy+=64) ot.fillRect(ROAD_CX-3, gy, 6, 32);

  // Subtle lane guides
  const lL = ROAD_LEFT + ROAD_W*0.33, lR = ROAD_LEFT + ROAD_W*0.67;
  ot.fillStyle = 'rgba(255,255,255,0.20)';
  for (let gy=0; gy<TEX_H; gy+=64) {
    ot.fillRect(lL-1, gy+16, 2, 24);
    ot.fillRect(lR-1, gy+16, 2, 24);
  }
  return ot.getImageData(0, 0, TEX_W, TEX_H);
}
const ROAD_TEX = buildRoadTexture();

// ── Mode 7 constants ──────────────────────────────────────────
const HORIZON_Y = Math.round(H*0.40);   // 240
const CAMERA_H  = 68;
const FOCAL     = Math.round(H*0.55);   // 330
const GROUND_H  = H - HORIZON_Y;        // 360

// ── Mode 7 scanline renderer ──────────────────────────────────
function drawMode7() {
  // Sky
  const sky = ctx.createLinearGradient(0,0,0,HORIZON_Y);
  sky.addColorStop(0,   '#07071f');
  sky.addColorStop(0.55,'#1a3a6e');
  sky.addColorStop(1,   '#5d9ecf');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,HORIZON_Y);

  ctx.save();
  ctx.shadowColor='#fffaaa'; ctx.shadowBlur=36;
  ctx.fillStyle='#fff5a8';
  ctx.beginPath(); ctx.arc(W*0.78,HORIZON_Y*0.32,26,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();

  function cloud(cx,cy,r) {
    ctx.fillStyle='rgba(255,255,255,0.83)';
    [[0,0,r],[r*.75,-r*.28,r*.72],[-r*.68,-r*.22,r*.68],[r*1.35,-r*.08,r*.58]].forEach(
      ([dx,dy,cr])=>{ ctx.beginPath(); ctx.arc(cx+dx,cy+dy,cr,0,Math.PI*2); ctx.fill(); }
    );
  }
  cloud(W*0.10,HORIZON_Y*0.36,20);
  cloud(W*0.36,HORIZON_Y*0.20,26);
  cloud(W*0.60,HORIZON_Y*0.44,17);
  ctx.fillStyle='rgba(160,200,240,0.18)';
  ctx.fillRect(0,HORIZON_Y-5,W,10);

  // Scanlines
  const out  = ctx.createImageData(W, GROUND_H);
  const pix  = out.data;
  const tex  = ROAD_TEX.data;
  const sinA = Math.sin(player.angle);
  const cosA = Math.cos(player.angle);

  let idx = 0;
  for (let row=0; row<GROUND_H; row++) {
    const dy  = row+1;
    const d   = CAMERA_H * FOCAL / dy;
    const wx0 = player.x + sinA*d - cosA*(W*0.5)*d/FOCAL;
    const wy0 = player.y - cosA*d - sinA*(W*0.5)*d/FOCAL;
    const dWX = cosA*d/FOCAL;
    const dWY = sinA*d/FOCAL;
    const fog = Math.max(0, 1 - dy/(GROUND_H*0.9));

    for (let col=0; col<W; col++) {
      const wx = wx0 + dWX*col;
      const wy = wy0 + dWY*col;
      const rawTX = wx|0;
      // No x-tiling: outside texture bounds = solid grass
      let r=58, g=125, b=68;
      if (rawTX>=0 && rawTX<TEX_W) {
        const ty = (wy|0) & (TEX_H-1);  // y-tiles (power-of-2 bitmask)
        const ti = (ty*TEX_W + rawTX) << 2;
        r=tex[ti]; g=tex[ti+1]; b=tex[ti+2];
      }
      if (fog>0) {
        r = (r+(162-r)*fog)|0;
        g = (g+(188-g)*fog)|0;
        b = (b+(218-b)*fog)|0;
      }
      pix[idx]=r; pix[idx+1]=g; pix[idx+2]=b; pix[idx+3]=255;
      idx+=4;
    }
  }
  ctx.putImageData(out, 0, HORIZON_Y);
}

// ── World-to-screen projection ────────────────────────────────
function worldToScreen(wx, wy) {
  const dx=wx-player.x, dy=wy-player.y;
  const sinA=Math.sin(player.angle), cosA=Math.cos(player.angle);
  const camZ = dx*sinA - dy*cosA;
  const camX = dx*cosA + dy*sinA;
  if (camZ <= 2) return null;
  return { sx:W/2+camX*FOCAL/camZ, sy:HORIZON_Y+CAMERA_H*FOCAL/camZ, sz:FOCAL/camZ };
}

// ── Ground effects ────────────────────────────────────────────
function drawGroundEffects() {
  if (effects.oil <= 0) return;
  const hue=(lastTs*0.15)%360;
  const g=ctx.createLinearGradient(0,HORIZON_Y+55,0,H*0.82);
  g.addColorStop(0,'transparent');
  g.addColorStop(0.5,`hsla(${hue},90%,65%,0.16)`);
  g.addColorStop(1,`hsla(${(hue+120)%360},90%,65%,0.12)`);
  ctx.fillStyle=g; ctx.fillRect(0,HORIZON_Y+55,W,H*0.82-HORIZON_Y-55);
}

function drawBoostEffect() {
  if (effects.boost <= 0) return;
  const a=Math.min(effects.boost/2,1);
  const gL=ctx.createLinearGradient(0,0,W*0.28,0);
  gL.addColorStop(0,`rgba(255,120,0,${a*0.55})`); gL.addColorStop(1,'transparent');
  ctx.fillStyle=gL; ctx.fillRect(0,0,W*0.28,H);
  const gR=ctx.createLinearGradient(W,0,W*0.72,0);
  gR.addColorStop(0,`rgba(255,120,0,${a*0.55})`); gR.addColorStop(1,'transparent');
  ctx.fillStyle=gR; ctx.fillRect(W*0.72,0,W*0.28,H);
  ctx.save(); ctx.strokeStyle=`rgba(255,220,80,${a*0.4})`; ctx.lineWidth=1.5;
  for (let i=0;i<7;i++) {
    const y=HORIZON_Y*0.12+i*16, len=32+i*7;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(len,y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W,y); ctx.lineTo(W-len,y); ctx.stroke();
  }
  ctx.restore();
}

// ── Roadside scenery (tiled trees) ───────────────────────────
const TREE_XS      = [152, 196, 604, 648];
const TREE_SPACING = 80;
const TREE_AHEAD   = 820;

function drawScenery() {
  const vis=[];
  const rowStart=Math.floor((player.y-TREE_AHEAD)/TREE_SPACING)*TREE_SPACING;
  for (let wy=rowStart; wy<player.y+40; wy+=TREE_SPACING) {
    for (const wx of TREE_XS) {
      const jx=Math.sin(wy*0.137+wx*0.05)*14;
      const proj=worldToScreen(wx+jx, wy);
      if (!proj||proj.sx<-60||proj.sx>W+60||proj.sy<HORIZON_Y||proj.sy>H+80) continue;
      vis.push(proj);
    }
  }
  vis.sort((a,b)=>a.sz-b.sz);
  for (const p of vis) drawTreeSprite(p.sx,p.sy,p.sz);
}

function drawTreeSprite(sx,sy,sz) {
  const h=sz*28; if (h<2) return;
  ctx.save(); ctx.translate(sx,sy);
  const tw=Math.max(1.5,sz*4);
  ctx.fillStyle='#5c3a10'; ctx.fillRect(-tw/2,-h*0.48,tw,h*0.48);
  ctx.fillStyle='#266b2e'; ctx.beginPath(); ctx.arc(0,-h*0.66,h*0.40,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#36a043'; ctx.beginPath(); ctx.arc(0,-h*0.78,h*0.28,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Dashboard / cockpit ───────────────────────────────────────
function drawDashboard() {
  const def=CARS[player.colorIdx];
  const gl=ctx.createLinearGradient(0,HORIZON_Y,W*0.28,H);
  gl.addColorStop(0,def.color+'00'); gl.addColorStop(1,def.color+'ee');
  ctx.fillStyle=gl;
  ctx.beginPath(); ctx.moveTo(0,HORIZON_Y+20); ctx.lineTo(W*0.19,HORIZON_Y+20);
  ctx.lineTo(W*0.28,H*0.80); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  const gr=ctx.createLinearGradient(W,HORIZON_Y,W*0.72,H);
  gr.addColorStop(0,def.color+'00'); gr.addColorStop(1,def.color+'ee');
  ctx.fillStyle=gr;
  ctx.beginPath(); ctx.moveTo(W,HORIZON_Y+20); ctx.lineTo(W*0.81,HORIZON_Y+20);
  ctx.lineTo(W*0.72,H*0.80); ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  const gh=ctx.createLinearGradient(0,H*0.76,0,H);
  gh.addColorStop(0,'transparent'); gh.addColorStop(0.25,def.color+'bb'); gh.addColorStop(1,def.color);
  ctx.fillStyle=gh;
  ctx.beginPath(); ctx.moveTo(W*0.28,H*0.80);
  ctx.bezierCurveTo(W*0.28,H*0.73,W*0.72,H*0.73,W*0.72,H*0.80);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.moveTo(W*0.47,H*0.775); ctx.lineTo(W*0.53,H*0.775);
  ctx.lineTo(W*0.53,H); ctx.lineTo(W*0.47,H); ctx.closePath(); ctx.fill();

  const wx=W/2, wy=H*0.875, wr=30;
  ctx.save(); ctx.translate(wx,wy); ctx.rotate(steerAngle*Math.PI*0.45);
  ctx.strokeStyle='rgba(255,255,255,0.72)'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.arc(0,0,wr,0,Math.PI*2); ctx.stroke();
  ctx.lineWidth=4;
  for (let a=0;a<3;a++) {
    const ang=a*(Math.PI*2/3)-Math.PI/2;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(ang)*wr,Math.sin(ang)*wr); ctx.stroke();
  }
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Cars ──────────────────────────────────────────────────────
const CARS = [
  { name:'Agnes Rocket', color:'#e63946', accent:'#ff9a9a', maxSpeed:340, accel:420, turnRate:2.4, desc:'Fast & fierce' },
  { name:'Johan Bullet', color:'#1d7fc4', accent:'#90cbf9', maxSpeed:290, accel:360, turnRate:2.9, desc:'Best handling' },
  { name:'Paul Gecko',   color:'#2dc653', accent:'#a0e8b0', maxSpeed:310, accel:390, turnRate:2.7, desc:'All-rounder'  },
];

// ── Utility ───────────────────────────────────────────────────
function rrect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawMiniCar(cx,cy,color,accent,s) {
  ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s);
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.ellipse(2,2,16,26,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=color; rrect(-13,-24,26,48,7); ctx.fill();
  ctx.fillStyle=accent+'cc'; rrect(-8,-16,16,12,3); ctx.fill();
  ctx.fillStyle=accent+'88'; rrect(-8,6,16,8,3); ctx.fill();
  ctx.fillStyle='#1a1a1a';
  [[-17,-14],[17,-14],[-17,12],[17,12]].forEach(([wx,wy])=>{
    ctx.beginPath(); ctx.ellipse(wx,wy,5,7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#888'; ctx.beginPath(); ctx.ellipse(wx,wy,2.5,3.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a1a1a';
  });
  ctx.fillStyle='rgba(255,255,255,0.9)'; rrect(-6,18,12,6,2); ctx.fill();
  ctx.restore();
}

// ── Select screen ─────────────────────────────────────────────
let selectedCar=0;

function drawSelect() {
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#06062a'); bg.addColorStop(1,'#1a1a4e');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ffdd00'; ctx.font='bold 46px Arial'; ctx.fillText('Kids Car Racing',W/2,62);
  ctx.fillStyle='#ffffff99'; ctx.font='19px Arial'; ctx.fillText('Dodge obstacles · collect coins & stars!',W/2,92);

  const cardW=188, cardH=250, gap=22;
  const startX=(W-(CARS.length*cardW+(CARS.length-1)*gap))/2;
  CARS.forEach((car,i)=>{
    const cx=startX+i*(cardW+gap), cy=118, sel=i===selectedCar;
    if (sel){ctx.shadowColor=car.color;ctx.shadowBlur=24;}
    ctx.fillStyle=sel?car.color+'bb':'rgba(255,255,255,0.1)';
    rrect(cx,cy,cardW,cardH,18); ctx.fill(); ctx.shadowBlur=0;
    ctx.strokeStyle=sel?car.color:'rgba(255,255,255,0.25)';
    ctx.lineWidth=sel?3:1.5; rrect(cx,cy,cardW,cardH,18); ctx.stroke();
    drawMiniCar(cx+cardW/2,cy+94,car.color,car.accent,1.8);
    ctx.fillStyle='#fff'; ctx.font='bold 18px Arial'; ctx.textAlign='center';
    ctx.fillText(car.name,cx+cardW/2,cy+166);
    ctx.fillStyle='#ccc'; ctx.font='14px Arial'; ctx.fillText(car.desc,cx+cardW/2,cy+186);
    drawStatBar(cx+16,cy+202,cardW-32,'Speed',car.maxSpeed/340);
    drawStatBar(cx+16,cy+222,cardW-32,'Handling',car.turnRate/2.9);
    if (sel){ctx.fillStyle='#ffdd00';ctx.font='bold 13px Arial';ctx.fillText('SELECTED ✓',cx+cardW/2,cy+240);}
  });

  const btnX=W/2-110, btnY=408;
  const g=ctx.createLinearGradient(btnX,btnY,btnX,btnY+56);
  g.addColorStop(0,'#ffdd00'); g.addColorStop(1,'#f4a800');
  ctx.fillStyle=g; rrect(btnX,btnY,220,56,14); ctx.fill();
  ctx.fillStyle='#1a0000'; ctx.font='bold 26px Arial'; ctx.textAlign='center';
  ctx.fillText('DRIVE!',W/2,btnY+37);
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='14px Arial';
  ctx.fillText('← → arrows to steer  ·  touch buttons on mobile',W/2,490);
  ctx.fillText('Coins +10  ·  Stars +50 & boost  ·  Avoid cones & oil',W/2,512);
}

function drawStatBar(x,y,w,label,frac) {
  ctx.fillStyle='rgba(255,255,255,0.15)'; rrect(x,y,w,10,5); ctx.fill();
  ctx.fillStyle='#ffdd00'; rrect(x,y,Math.round(w*frac),10,5); ctx.fill();
  ctx.fillStyle='#ccc'; ctx.font='11px Arial'; ctx.textAlign='left'; ctx.fillText(label,x,y-1);
}

// ── Input ─────────────────────────────────────────────────────
function canvasXY(e) {
  const r=canvas.getBoundingClientRect();
  return [(e.clientX-r.left)/scale,(e.clientY-r.top)/scale];
}

const vBtn={left:false,right:false};
const activePtrs=new Map();

function hitTouchButton(mx,my) {
  const defs=[{x:80,y:H-72,r:56,k:'left'},{x:W-80,y:H-72,r:56,k:'right'}];
  for (const b of defs) if ((mx-b.x)**2+(my-b.y)**2<b.r**2) return b.k;
  return null;
}

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const [mx,my]=canvasXY(e);
  if (state==='select') {
    const cardW=188,cardH=250,gap=22,startX=(W-(CARS.length*cardW+(CARS.length-1)*gap))/2;
    CARS.forEach((_,i)=>{ const cx=startX+i*(cardW+gap); if(mx>=cx&&mx<=cx+cardW&&my>=118&&my<=118+cardH) selectedCar=i; });
    if (mx>=W/2-110&&mx<=W/2+110&&my>=408&&my<=464) beginRun();
    return;
  }
  if (state==='playing'||state==='countdown') {
    const btn=hitTouchButton(mx,my);
    if (btn){vBtn[btn]=true;activePtrs.set(e.pointerId,btn);}
    return;
  }
  if (state==='gameover') {
    if (mx>=W/2-210&&mx<=W/2-10&&my>=370&&my<=424) beginRun();
    if (mx>=W/2+10&&mx<=W/2+210&&my>=370&&my<=424) state='select';
  }
},{passive:false});

canvas.addEventListener('pointermove',e=>{
  if (state!=='playing'&&state!=='countdown') return;
  const [mx,my]=canvasXY(e);
  const prev=activePtrs.get(e.pointerId),next=hitTouchButton(mx,my);
  if (prev!==next){if(prev){vBtn[prev]=false;activePtrs.delete(e.pointerId);}if(next){vBtn[next]=true;activePtrs.set(e.pointerId,next);}}
});
canvas.addEventListener('pointerup',    e=>{const b=activePtrs.get(e.pointerId);if(b){vBtn[b]=false;activePtrs.delete(e.pointerId);}});
canvas.addEventListener('pointercancel',e=>{const b=activePtrs.get(e.pointerId);if(b){vBtn[b]=false;activePtrs.delete(e.pointerId);}});

const keys={};
window.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key]=true;
  if(e.key===' '&&state==='select') beginRun();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// ── Game state ────────────────────────────────────────────────
let state='select';
let player={};
let lastTs=0;
let countdownVal=3, countdownTimer=0;
let score=0, collectScore=0, lives=3, distance=0;
let highScore=parseInt(localStorage.getItem('carHighScore')||'0');
const effects={boost:0,oil:0,invincible:0};
let oilDrift=0;
let items=[], popups=[];
let steerAngle=0;
let confetti=[], confettiSpawned=false;
let lastHitFlash=0;
let spawnTimer=0;
let baseSpeed=0;
let speedLevel=0, speedLevelFlash=0;

const LATERAL_SPEED=250;
const SPAWN_AHEAD=720;

function beginRun() {
  const def=CARS[selectedCar];
  player={x:ROAD_CX,y:0,angle:0,speed:180,maxSpeed:def.maxSpeed,accel:def.accel,turnRate:def.turnRate,colorIdx:selectedCar};
  score=0; collectScore=0; lives=3; distance=0;
  effects.boost=0; effects.oil=0; effects.invincible=0; oilDrift=0;
  popups=[]; steerAngle=0; confettiSpawned=false; confetti=[];
  items=[]; spawnTimer=0; baseSpeed=180; speedLevel=0; speedLevelFlash=0;
  countdownVal=3; countdownTimer=0;
  state='countdown';
}

// ── Player physics ────────────────────────────────────────────
function updatePlayer(dt) {
  const left =keys['ArrowLeft'] ||keys['a']||keys['A']||vBtn.left;
  const right=keys['ArrowRight']||keys['d']||keys['D']||vBtn.right;

  // Speed level: +12% max speed every 2500m, obstacles spawn faster too
  const newLevel=Math.floor(distance/25000);
  if (newLevel>speedLevel){ speedLevel=newLevel; speedLevelFlash=2.8; }
  const effectiveMax=player.maxSpeed*(1+speedLevel*0.12);
  baseSpeed   =Math.min(baseSpeed+14*dt, effectiveMax);
  player.speed=baseSpeed*(effects.boost>0?1.5:1.0);
  speedLevelFlash=Math.max(0,speedLevelFlash-dt);

  const lateralMult=effects.oil>0?0.55:1.0;
  if (left)  player.x-=LATERAL_SPEED*lateralMult*dt;
  if (right) player.x+=LATERAL_SPEED*lateralMult*dt;
  if (effects.oil>0) player.x+=oilDrift*LATERAL_SPEED*0.45*dt;

  player.x=Math.max(ROAD_LEFT+16, Math.min(ROAD_RIGHT-16, player.x));

  const steerTarget=(left?-1:right?1:0)*0.038;
  player.angle+=(steerTarget-player.angle)*Math.min(dt*6,1);
  steerAngle  +=((left?-1:right?1:0)*0.9-steerAngle)*Math.min(dt*6,1);

  player.y   -=player.speed*dt;
  distance   +=player.speed*dt;
  score       =Math.floor(distance/10)+collectScore;

  effects.boost     =Math.max(0,effects.boost-dt);
  effects.oil       =Math.max(0,effects.oil-dt);
  effects.invincible=Math.max(0,effects.invincible-dt);
  lastHitFlash      =Math.max(0,lastHitFlash-dt);
}

// ── Items ─────────────────────────────────────────────────────
const ITEM_DEFS={coin:{r:11},star:{r:13},oil:{r:20},cone:{r:9}};

function shuffleLanes(){ return [...LANES].sort(()=>Math.random()-0.5); }

function spawnWave() {
  const y=player.y-SPAWN_AHEAD, r=Math.random();
  if (r<0.32) {
    for (const lx of shuffleLanes().slice(0,3)) items.push({type:'coin',x:lx,y,active:true});
  } else if (r<0.50) {
    items.push({type:'star',x:ROAD_CX,y,active:true});
    items.push({type:'coin',x:LANES[1],y:y-80,active:true});
    items.push({type:'coin',x:LANES[3],y:y-80,active:true});
  } else if (r<0.68) {
    const blocked=shuffleLanes().slice(0,2);
    for (const lx of blocked) items.push({type:'cone',x:lx,y,active:true});
    if (Math.random()<0.55) items.push({type:'coin',x:ROAD_CX,y:y-70,active:true});
  } else if (r<0.82) {
    const li=Math.floor(Math.random()*LANES.length);
    items.push({type:'oil',x:LANES[li],y,active:true});
    items.push({type:'coin',x:LANES[(li+2)%LANES.length],y:y-70,active:true});
  } else {
    const s1=Math.floor(Math.random()*LANES.length), s2=(s1+2)%LANES.length;
    LANES.forEach((lx,i)=>{if(i!==s1&&i!==s2) items.push({type:'cone',x:lx,y:y+(i%2===0?0:-44),active:true});});
  }
}

function updateItems(dt) {
  const interval=Math.max(1.8-distance/7000, Math.max(0.55-speedLevel*0.05, 0.28));
  spawnTimer+=dt;
  if (spawnTimer>=interval){spawnTimer=0;spawnWave();}
  items=items.filter(it=>it.y<player.y+150);
}

function checkItemCollisions() {
  for (const item of items) {
    if (!item.active) continue;
    const dx=player.x-item.x, dy=player.y-item.y, r=ITEM_DEFS[item.type].r+12;
    if (dx*dx+dy*dy<r*r) collectItem(item);
  }
}

function collectItem(item) {
  item.active=false;
  if (item.type==='coin') {
    collectScore+=10;
    popups.push({x:item.x,y:item.y,text:'+10',life:1.0});
  } else if (item.type==='star') {
    collectScore+=50; effects.boost=2.2; effects.invincible=2.2;
    popups.push({x:item.x,y:item.y,text:'STAR! +50',life:1.4});
  } else if (item.type==='oil') {
    if (effects.invincible>0) return;
    effects.oil=2.2; oilDrift=Math.random()<0.5?-1:1;
    popups.push({x:item.x,y:item.y,text:'SLIPPERY!',life:1.2});
  } else if (item.type==='cone') {
    if (effects.invincible>0) return;
    baseSpeed=Math.max(baseSpeed*0.65,120);
    popups.push({x:item.x,y:item.y,text:'BUMP!',life:1.0});
    hurtPlayer();
  }
}

function hurtPlayer() {
  if (effects.invincible>0) return;
  lives--; lastHitFlash=0.85; effects.invincible=1.6;
  if (lives<=0) {
    if (score>highScore){highScore=score;localStorage.setItem('carHighScore',String(highScore));}
    state='gameover';
  }
}

function updatePopups(dt) {
  for (const p of popups) p.life-=dt;
  popups=popups.filter(p=>p.life>0);
}

// ── Item drawing ──────────────────────────────────────────────
function drawItems() {
  const vis=[];
  for (const item of items) {
    if (!item.active) continue;
    const proj=worldToScreen(item.x,item.y);
    if (!proj||proj.sx<-80||proj.sx>W+80||proj.sy<HORIZON_Y||proj.sy>H+40) continue;
    vis.push({item,proj});
  }
  vis.sort((a,b)=>a.proj.sz-b.proj.sz);

  for (const {item,proj} of vis) {
    const {sx,sy,sz}=proj;
    const s=Math.max(0.25,Math.min(sz*0.65,3.5));
    ctx.save(); ctx.translate(sx,sy); ctx.scale(s,s);
    if (item.type==='coin') {
      ctx.shadowColor='#FFD700'; ctx.shadowBlur=8;
      ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.fillStyle='#B8860B'; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#FFD700'; ctx.font='bold 9px Arial'; ctx.textAlign='center'; ctx.fillText('$',0,3);
    } else if (item.type==='star') {
      ctx.shadowColor='#fffaaa'; ctx.shadowBlur=10;
      ctx.fillStyle=`hsl(50,100%,${50+Math.sin(lastTs*0.003)*8}%)`;
      ctx.beginPath();
      for (let k=0;k<10;k++){const rr=k%2===0?13:6,a=(k/10)*Math.PI*2-Math.PI/2;k===0?ctx.moveTo(rr*Math.cos(a),rr*Math.sin(a)):ctx.lineTo(rr*Math.cos(a),rr*Math.sin(a));}
      ctx.closePath(); ctx.fill();
    } else if (item.type==='oil') {
      ctx.fillStyle='#111'; ctx.beginPath(); ctx.ellipse(0,0,22,8,0,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.5; ctx.fillStyle=`hsl(${(lastTs*0.1)%360},80%,55%)`;
      ctx.beginPath(); ctx.ellipse(-4,-1,9,4,-0.4,0,Math.PI*2); ctx.fill();
    } else if (item.type==='cone') {
      ctx.fillStyle='#FF6600'; ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(9,8); ctx.lineTo(-9,8); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#fff'; ctx.fillRect(-8,1,16,3);
    }
    ctx.restore();
  }

  for (const p of popups) {
    const proj=worldToScreen(p.x,p.y);
    const sx=proj?proj.sx:W/2, sy=proj?proj.sy-20:H/2;
    const alpha=Math.min(p.life/0.35,1), rise=(1.4-p.life)*30;
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.font='bold 16px Arial'; ctx.textAlign='center';
    ctx.lineWidth=3; ctx.strokeStyle='#000'; ctx.strokeText(p.text,sx,sy-rise);
    ctx.fillStyle='#ffdd00'; ctx.fillText(p.text,sx,sy-rise);
    ctx.restore();
  }
}

// ── HUD ───────────────────────────────────────────────────────
function drawHUD() {
  for (let i=0;i<3;i++){
    ctx.fillStyle=i<lives?'#ff4444':'rgba(255,255,255,0.18)';
    ctx.font='bold 26px Arial'; ctx.textAlign='left'; ctx.fillText('♥',18+i*34,40);
  }
  ctx.fillStyle='rgba(0,0,0,0.52)'; rrect(12,50,150,40,10); ctx.fill();
  ctx.fillStyle='#ffdd00'; ctx.font='bold 11px Arial'; ctx.textAlign='left'; ctx.fillText('SCORE',22,64);
  ctx.fillStyle='#fff'; ctx.font='bold 24px Arial'; ctx.fillText(String(score),22,86);

  ctx.fillStyle='rgba(0,0,0,0.52)'; rrect(12,98,150,40,10); ctx.fill();
  ctx.fillStyle='#aaa'; ctx.font='bold 11px Arial'; ctx.fillText('DISTANCE',22,112);
  ctx.fillStyle='#fff'; ctx.font='bold 20px Arial'; ctx.fillText(Math.floor(distance/10)+'m',22,130);

  const spd=Math.round(Math.abs(player.speed)), frac=spd/player.maxSpeed;
  const barClr=frac<0.6?'#00e676':frac<0.85?'#ffdd00':'#ff4444';
  ctx.fillStyle='rgba(0,0,0,0.52)'; rrect(W-136,H-58,124,46,10); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.08)'; rrect(W-128,H-48,108,13,4); ctx.fill();
  ctx.fillStyle=barClr; rrect(W-128,H-48,Math.round(108*frac),13,4); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 20px Arial'; ctx.textAlign='right'; ctx.fillText(spd+' km/h',W-18,H-18);

  if (effects.boost>0) {
    ctx.fillStyle='rgba(255,200,0,0.92)'; ctx.font='bold 16px Arial'; ctx.textAlign='center';
    ctx.fillText('BOOST '+Math.ceil(effects.boost)+'s',W/2,28);
  } else if (effects.oil>0) {
    ctx.fillStyle='rgba(120,255,180,0.92)'; ctx.font='bold 16px Arial'; ctx.textAlign='center';
    ctx.fillText('SLIPPERY!',W/2,28);
  }
  if (speedLevelFlash>0) {
    const fade=Math.min(speedLevelFlash,1);
    ctx.strokeStyle=`rgba(255,220,0,${fade*0.7})`; ctx.lineWidth=8; ctx.strokeRect(4,4,W-8,H-8);
    ctx.textAlign='center'; ctx.font='bold 22px Arial';
    ctx.fillStyle=`rgba(0,0,0,${fade*0.5})`; ctx.fillText('FASTER!  Level '+speedLevel,W/2+2,56);
    ctx.fillStyle=`rgba(255,220,0,${fade})`; ctx.fillText('FASTER!  Level '+speedLevel,W/2,54);
  }

  if (lastHitFlash>0) {
    const a=lastHitFlash*0.55;
    ctx.fillStyle=`rgba(255,0,0,${a*0.30})`; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=`rgba(255,0,0,${a})`; ctx.lineWidth=14; ctx.strokeRect(7,7,W-14,H-14);
  }
}

// ── Touch buttons ─────────────────────────────────────────────
function drawTouchButtons() {
  const defs=[{x:80,y:H-72,label:'◄',active:vBtn.left},{x:W-80,y:H-72,label:'►',active:vBtn.right}];
  for (const b of defs) {
    ctx.save();
    ctx.fillStyle=b.active?'rgba(255,255,255,0.44)':'rgba(0,0,0,0.38)';
    ctx.beginPath(); ctx.arc(b.x,b.y,54,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.fillStyle=b.active?'#000':'rgba(255,255,255,0.8)';
    ctx.font='bold 30px Arial'; ctx.textAlign='center'; ctx.fillText(b.label,b.x,b.y+11);
    ctx.restore();
  }
}

// ── Traffic light / countdown ─────────────────────────────────
function drawTrafficLight() {
  const cx=W/2, cy=HORIZON_Y-10, lw=50, lh=124;
  ctx.fillStyle='rgba(60,60,60,0.85)'; ctx.fillRect(cx-3,cy-lh/2,6,lh+36);
  ctx.fillStyle='rgba(14,14,14,0.90)'; rrect(cx-lw/2,cy-lh/2,lw,lh,10); ctx.fill();
  ctx.strokeStyle='rgba(110,110,110,0.7)'; ctx.lineWidth=2; rrect(cx-lw/2,cy-lh/2,lw,lh,10); ctx.stroke();
  const isGo=countdownVal<=0, numLit=isGo?3:countdownVal;
  const clr=isGo?'#00ff88':'#ff2222', dimClr=isGo?'#003311':'#330000';
  [-38,0,38].forEach((dy,i)=>{
    const lit=i<numLit;
    ctx.save(); if(lit){ctx.shadowColor=clr;ctx.shadowBlur=22;}
    ctx.fillStyle=lit?clr:dimClr; ctx.beginPath(); ctx.arc(cx,cy+dy,15,0,Math.PI*2); ctx.fill();
    if(lit){ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.22)';ctx.beginPath();ctx.arc(cx-5,cy+dy-5,5,0,Math.PI*2);ctx.fill();}
    ctx.shadowBlur=0; ctx.restore();
  });
  const label=countdownVal>0?String(countdownVal):'GO!';
  ctx.textAlign='center'; ctx.font='bold 82px Arial';
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillText(label,cx+3,cy+lh/2+76);
  ctx.fillStyle=isGo?'#00e676':'#ffdd00'; ctx.fillText(label,cx,cy+lh/2+73);
}

// ── Game over screen ──────────────────────────────────────────
function drawGameOver() {
  ctx.fillStyle='rgba(10,10,30,0.84)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='58px Arial'; ctx.fillText('🏁',W/2,88);
  ctx.fillStyle='#ffdd00'; ctx.font='bold 44px Arial'; ctx.fillText('Game Over!',W/2,152);
  ctx.fillStyle='rgba(255,255,255,0.07)'; rrect(W/2-210,170,420,168,16); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1.5; rrect(W/2-210,170,420,168,16); ctx.stroke();

  const cell=(label,value,x,y)=>{
    ctx.textAlign='left'; ctx.fillStyle='#aaa'; ctx.font='bold 13px Arial'; ctx.fillText(label,x,y);
    ctx.fillStyle='#fff'; ctx.font='bold 24px Arial'; ctx.fillText(value,x,y+26);
  };
  cell('SCORE',String(score),W/2-190,200);
  cell('DISTANCE',Math.floor(distance/10)+'m',W/2+20,200);
  cell('HIGH SCORE',String(highScore),W/2-190,268);
  if (score>=highScore && score>0) {
    ctx.fillStyle='#00e676'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
    ctx.fillText('NEW HIGH SCORE!  ⭐',W/2,312);
  }

  const g1=ctx.createLinearGradient(W/2-210,370,W/2-210,424);
  g1.addColorStop(0,'#00c853'); g1.addColorStop(1,'#007c2e');
  ctx.fillStyle=g1; rrect(W/2-210,370,194,54,14); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 21px Arial'; ctx.textAlign='center'; ctx.fillText('Play Again',W/2-113,403);

  const g2=ctx.createLinearGradient(W/2+16,370,W/2+16,424);
  g2.addColorStop(0,'#1565c0'); g2.addColorStop(1,'#0a3880');
  ctx.fillStyle=g2; rrect(W/2+16,370,194,54,14); ctx.fill();
  ctx.fillStyle='#fff'; ctx.fillText('Change Car',W/2+113,403);
}

// ── Confetti ──────────────────────────────────────────────────
const CONF_COLORS=['#ffdd00','#ff4444','#00e676','#4488ff','#ff6600','#cc44ff','#ffffff'];
function spawnConfetti() {
  if (confettiSpawned) return; confettiSpawned=true;
  confetti=Array.from({length:56},(_,i)=>({
    x:(i/56)*W+(Math.random()-0.5)*60, y:-12-Math.random()*H*0.5,
    vx:(Math.random()-0.5)*55, vy:65+Math.random()*85,
    w:5+Math.random()*7, h:3+Math.random()*4,
    rot:Math.random()*Math.PI*2, vr:(Math.random()-0.5)*6,
    color:CONF_COLORS[i%CONF_COLORS.length],
  }));
}
function updateConfetti(dt){for(const p of confetti){p.x+=p.vx*dt;p.y+=p.vy*dt;p.rot+=p.vr*dt;if(p.y>H+20)p.y=-20;}}
function drawConfetti(){for(const p of confetti){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();}}

// ── Game loop ─────────────────────────────────────────────────
function loop(ts) {
  const dt=Math.min((ts-lastTs)/1000, 0.05);
  lastTs=ts;
  ctx.clearRect(0,0,W,H);

  if (state==='select') {
    drawSelect();
  } else if (state==='countdown') {
    countdownTimer+=dt;
    if (countdownTimer>=1){countdownTimer-=1;countdownVal--;if(countdownVal<0)state='playing';}
    drawMode7(); drawGroundEffects(); drawScenery(); drawItems();
    drawDashboard(); drawHUD(); drawTouchButtons(); drawTrafficLight();
  } else if (state==='playing') {
    updatePlayer(dt); updateItems(dt); updatePopups(dt); checkItemCollisions();
    drawMode7(); drawGroundEffects(); drawScenery(); drawItems();
    drawDashboard(); drawBoostEffect(); drawHUD(); drawTouchButtons();
  } else if (state==='gameover') {
    spawnConfetti(); updateConfetti(dt);
    drawMode7(); drawGroundEffects(); drawScenery();
    drawDashboard(); drawGameOver(); drawConfetti();
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
